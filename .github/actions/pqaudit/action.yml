name: pqaudit TLS Scan
description: Scan TLS endpoints for post-quantum readiness
inputs:
  targets:
    description: Space-separated list of targets to scan
    required: true
  fail-below:
    description: Exit code 1 if score below this threshold
    default: "0"
  compliance:
    description: Scoring framework (nist, cnsa2, fips)
    default: nist
  output-format:
    description: Output format (json, sarif, human)
    default: sarif
runs:
  using: composite
  steps:
    - name: Download pqaudit
      shell: bash
      run: |
        curl -sSL https://github.com/YasogaN/pqaudit/releases/latest/download/pqaudit-linux-x86_64 -o pqaudit
        chmod +x pqaudit
    - name: Run scan
      shell: bash
      env:
        PQAUDIT_TARGETS: ${{ inputs.targets }}
        PQAUDIT_COMPLIANCE: ${{ inputs.compliance }}
        PQAUDIT_OUTPUT: ${{ inputs.output-format }}
        PQAUDIT_FAIL_BELOW: ${{ inputs.fail-below }}
      run: |
        # shellcheck disable=SC2086 — word-split is intentional for space-separated targets
        ./pqaudit \
          --compliance "$PQAUDIT_COMPLIANCE" \
          --output "$PQAUDIT_OUTPUT" \
          --fail-below "$PQAUDIT_FAIL_BELOW" \
          $PQAUDIT_TARGETS
