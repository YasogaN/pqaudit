name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Verify tests pass before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --no-default-features
      - run: cargo test --features mcp

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: pqaudit-linux-x86_64
            rustflags: "-C target-feature=+crt-static"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: pqaudit-linux-aarch64
            rustflags: "-C target-feature=+crt-static"
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: pqaudit-macos-x86_64
            rustflags: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pqaudit-macos-aarch64
            rustflags: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pqaudit-windows-x86_64.exe
            rustflags: ""
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (aarch64 linux musl)
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build release binary (cross)
        if: matrix.use_cross
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Build release binary
        if: '!matrix.use_cross'
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/pqaudit ${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/pqaudit.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  publish:
    name: Publish to crates.io
    needs: [release, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
